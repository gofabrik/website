{{define "page"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{template "title" .}}</title>
  <meta name="description" content="{{template "description" .}}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%236459e6'/></svg>">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
{{template "body" .}}
  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© 2026 Fabrik. All rights reserved.</span>
      <a href="{{.Site.Config.Repo}}">GitHub</a>
    </div>
  </footer>
{{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
